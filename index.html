<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>tw1tt3r</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css?v=2" />
</head>
<body>

  <!-- TOP BAR (outside .layout so Safari sticky works) -->
  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-avatar" onclick="location.href='stats.html'" style="cursor:pointer;">z</div>
      <svg class="topbar-logo" viewBox="0 0 24 24">
        <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.747l7.73-8.835L1.254 2.25H8.08l4.26 5.632L18.244 2.25zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
      </svg>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="all">For You</div>
      <div class="tab" data-tab="history">History</div>
      <div class="tab" data-tab="language">Language</div>
      <div class="tab" data-tab="geography">Geography</div>
      <div class="tab" data-tab="trivia">Trivia</div>
    </div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-label" id="progress-label"></div>
    </div>
  </header>

  <div class="layout">

    <!-- PULL TO REFRESH -->
    <div id="ptr">
      <svg id="ptr-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
      </svg>
    </div>

    <!-- FEED -->
    <main class="feed" id="feed"></main>
    <p class="empty" id="empty"></p>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
      <div class="nav-btn active" id="nav-home">
        <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </div>
      <div class="nav-btn" id="nav-loved">
        <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
      </div>
    </nav>

  </div>

<script src="js/posts.js?v=2"></script>
<script src="js/app.js?v=2"></script>

</body>
</html>
